<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Map — Real-Time Device Tracker</title>
  <link rel="stylesheet" href="/css/auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Animated grid background -->
  <div class="grid-bg"></div>
  <div class="noise-overlay"></div>

  <!-- Glowing orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-container">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2"/>
          <circle cx="20" cy="20" r="6" fill="currentColor"/>
          <line x1="20" y1="2" x2="20" y2="10" stroke="currentColor" stroke-width="2"/>
          <line x1="20" y1="30" x2="20" y2="38" stroke="currentColor" stroke-width="2"/>
          <line x1="2" y1="20" x2="10" y2="20" stroke="currentColor" stroke-width="2"/>
          <line x1="30" y1="20" x2="38" y2="20" stroke="currentColor" stroke-width="2"/>
        </svg>
      </div>
      <span class="brand-name">Track<span class="accent">map</span></span>
    </div>

    <!-- Tab switcher -->
    <div class="tab-bar">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
      <div class="tab-indicator" id="tab-indicator"></div>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-with-toggle">
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="toggle-pw" onclick="togglePassword('login-password')">👁</button>
        </div>
      </div>
      <div id="login-error" class="error-msg"></div>
      <button type="submit" class="btn-primary" id="login-btn">
        <span class="btn-text">Sign In</span>
        <span class="btn-loader" style="display:none">⏳</span>
      </button>
      <p class="demo-hint">Demo: admin@trackos.dev / admin123</p>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Your Name" required autocomplete="name" />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password <small>(min 6 chars)</small></label>
        <div class="input-with-toggle">
          <input type="password" id="reg-password" placeholder="••••••••" required minlength="6" autocomplete="new-password" />
          <button type="button" class="toggle-pw" onclick="togglePassword('reg-password')">👁</button>
        </div>
      </div>
      <div id="register-error" class="error-msg"></div>
      <button type="submit" class="btn-primary" id="register-btn">
        <span class="btn-text">Create Account</span>
        <span class="btn-loader" style="display:none">⏳</span>
      </button>
    </form>

  </div>

  <script>
    const API = '';  // Same origin

    // ── Tab switching ──
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      document.getElementById(`${tab}-form`).classList.add('active');
      document.getElementById('tab-indicator').style.transform =
        tab === 'login' ? 'translateX(0)' : 'translateX(100%)';
    }

    // ── Toggle password visibility ──
    function togglePassword(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    // ── Show error ──
    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    // ── Set loading state ──
    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.querySelector('.btn-text').style.display = loading ? 'none' : 'inline';
      btn.querySelector('.btn-loader').style.display = loading ? 'inline' : 'none';
      btn.disabled = loading;
    }

    // ── Handle Login ──
    async function handleLogin(e) {
      e.preventDefault();
      setLoading('login-btn', true);
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!data.success) throw new Error(data.message || 'Login failed.');

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';

      } catch (err) {
        showError('login-error', err.message);
      } finally {
        setLoading('login-btn', false);
      }
    }

    // ── Handle Register ──
    async function handleRegister(e) {
      e.preventDefault();
      setLoading('register-btn', true);
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;

      try {
        const res = await fetch(`${API}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();

        if (!data.success) {
          const errMsg = data.errors ? data.errors.map(e => e.msg).join(', ') : data.message;
          throw new Error(errMsg);
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';

      } catch (err) {
        showError('register-error', err.message);
      } finally {
        setLoading('register-btn', false);
      }
    }

    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard.html';
    }
  </script>
</body>
</html>
